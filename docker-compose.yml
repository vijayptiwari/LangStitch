# LangStitch — full stack (UI + Platform API)
# Usage: docker compose up --build
# Open: http://localhost:8080

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: langstitch-api:local
    # Loads auth + DB + OAuth settings when present (see .env.example).
    env_file:
      - path: .env
        required: false
    environment:
      LANGSTITCH_WORKSPACE: /data/workspaces
    volumes:
      - langstitch-workspaces:/data/workspaces
    depends_on:
      - db
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    image: langstitch-web:local
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  # MySQL for users + per-user workspaces. Only used when
  # LANGSTITCH_AUTH_ENABLED=true; harmless otherwise.
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-langstitch}
      MYSQL_USER: ${MYSQL_USER:-langstitch}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-langstitch}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    command: --default-authentication-plugin=caching_sha2_password
    volumes:
      - langstitch-mysql:/var/lib/mysql
    restart: unless-stopped

volumes:
  langstitch-workspaces:
  langstitch-mysql:
