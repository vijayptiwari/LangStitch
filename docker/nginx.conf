# LangStitch web — one image serves both the IDE and the marketplace.
# The SPA detects the host at runtime: marketplace.langstitch.com boots the
# standalone marketplace; every other host boots the IDE.

# ─── IDE / app (langstitch.com) + catch-all default ───
server {
    listen 80 default_server;
    server_name langstitch.com www.langstitch.com app.langstitch.com _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 55m;

    location /api/ {
        proxy_pass http://api:8787/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 55m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ─── Marketplace (marketplace.langstitch.com) ───
server {
    listen 80;
    server_name marketplace.langstitch.com;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 55m;

    location /api/ {
        proxy_pass http://api:8787/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 55m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
