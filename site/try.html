<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Try LangStitch — Live IDE</title>
  <meta name="description" content="Try LangStitch visual LangGraph IDE live in your browser." />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .try-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 1rem; border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    .try-bar a { color: var(--muted); text-decoration: none; font-size: 0.875rem; font-weight: 600; }
    .try-bar a:hover { color: var(--text); }
    .try-full { flex: 1; border: none; width: 100%; background: var(--bg); }
  </style>
</head>
<body>
  <div class="try-bar">
    <a href="./">← LangStitch</a>
    <span style="color: var(--muted); font-size: 0.8rem;">Live IDE preview</span>
    <a href="app/" target="_blank" rel="noopener">Open in new tab ↗</a>
  </div>
  <iframe src="app/" title="LangStitch IDE" class="try-full" allow="clipboard-read; clipboard-write"></iframe>
</body>
</html>
