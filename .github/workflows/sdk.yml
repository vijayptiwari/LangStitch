name: SDK

on:
  push:
    branches: [main]
    paths:
      - 'sdk/**'
      - '.github/workflows/sdk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'sdk/**'
      - '.github/workflows/sdk.yml'

permissions:
  contents: read

defaults:
  run:
    working-directory: sdk

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (with extras)
        run: python -m pip install --upgrade pip && pip install -e ".[dev,http]"

      - name: Run tests
        run: python -m pytest -q

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Verify wheel installs and CLI runs
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install dist/*.whl
          /tmp/venv/bin/langstitch version

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: langstitch-dist
          path: sdk/dist/*
