name: LangTailor Extension

on:
  push:
    branches: [main]
    paths:
      - 'langtailor/**'
      - 'src/webview/**'
      - 'vite.webview.config.ts'
      - '.github/workflows/langtailor-extension.yml'
  pull_request:
    branches: [main]
    paths:
      - 'langtailor/**'
      - 'src/webview/**'
      - 'vite.webview.config.ts'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-vsix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build canvas webview bundle
        run: npm run build:webview

      - name: Compile extensions + package VSIX
        run: |
          mkdir -p dist-langtailor
          cd langtailor/extension
          npm install
          npm run compile
          npx @vscode/vsce package --no-dependencies --out ../../dist-langtailor --allow-missing-repository
          cd ../marketplace-extension
          npm install
          npm run compile
          npx @vscode/vsce package --no-dependencies --out ../../dist-langtailor --allow-missing-repository

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: langtailor-vsix
          path: dist-langtailor/*.vsix
