name: Publish GitHub Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install and build
        run: npm ci && npm run build

      - name: Package release archive
        run: |
          tar -czf langstitch-source.tar.gz \
            --exclude=node_modules --exclude=dist --exclude=.git \
            .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: LangStitch ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            langstitch-source.tar.gz
          body: |
            ## Run LangStitch in 2 steps

            ### Option A — Docker (full Platform + UI)
            ```bash
            git clone https://github.com/vijayptiwari/LangStitch.git
            cd LangStitch
            docker compose -f docker-compose.prod.yml up
            ```
            Open **http://localhost:8080**

            ### Option B — Hosted (canvas, no install)
            Open **https://vijayptiwari.github.io/LangStitch/**

            ### Option C — GitHub Codespaces
            Click **Code → Create codespace on main** — LangStitch starts automatically.

            See [documentation](https://vijayptiwari.github.io/LangStitch/docs/) for details.
