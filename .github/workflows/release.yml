name: Publish GitHub Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install and build
        run: npm ci && npm run build && npm run build:webview

      - name: Package release archive
        run: |
          tar -czf "$RUNNER_TEMP/langstitch-source.tar.gz" \
            --exclude=node_modules --exclude=dist --exclude=.git \
            -C "$GITHUB_WORKSPACE" .
          cp "$RUNNER_TEMP/langstitch-source.tar.gz" "$GITHUB_WORKSPACE/langstitch-source.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: LangStitch ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            langstitch-source.tar.gz
          body: |
            ## Get LangStitch

            ### Option A — Canvas extension (`.vsix` / Open VSX)
            ```bash
            codium --install-extension langstitch.langtailor-canvas
            ```
            Or download the `.vsix` from the **langtailor-v*** release assets and install via **Extensions → Install from VSIX…**

            ### Option B — LangTailor desktop IDE
            Download portable builds from **[langtailor.langstitch.com](https://langtailor.langstitch.com/)** or the latest **langtailor-v*** GitHub Release (Windows / macOS).

            ### Option C — Docker (local Platform API stack)
            ```bash
            git clone https://github.com/vijayptiwari/LangStitch.git
            cd LangStitch
            docker compose -f docker-compose.prod.yml up
            ```
            Open **http://localhost:8080**

            ### Option D — Local development
            ```bash
            npm install && pip install -r server/requirements.txt && npm start
            ```

            See [documentation](https://langstitch.com/docs/) for details.
