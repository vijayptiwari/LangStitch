name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          pip install -r server/requirements.txt
          pip install ./sdk

      - name: Typecheck and build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: Build LangTailor webview + extension
        run: |
          npm run build:webview
          cd langtailor/extension && npm install && npm run compile

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Run marketplace E2E tests
        run: npm run test:e2e:marketplace

      - name: Run basic agent smoke test
        run: python runtime/basic_agent.py

      - name: Parser sidecar tests
        run: pytest runtime/tests/test_parse_graph.py -q
