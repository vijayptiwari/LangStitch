name: LangTailor Release

on:
  push:
    tags:
      - 'langtailor-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver without v prefix (e.g. 0.2.0)'
        required: true
        default: '0.2.0'

permissions:
  contents: write

jobs:
  build-vsix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Build VSIX bundles
        run: |
          npm ci
          npm run build:webview
          mkdir -p dist-langtailor
          cd langtailor/extension
          npm install
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            npm version "${{ inputs.version }}" --no-git-tag-version --allow-same-version
          fi
          npm run compile
          npx @vscode/vsce package --no-dependencies --out ../../dist-langtailor
          cd ../marketplace-extension
          npm install
          npm run compile
          npx @vscode/vsce package --no-dependencies --out ../../dist-langtailor

      - uses: actions/upload-artifact@v4
        with:
          name: langtailor-vsix
          path: dist-langtailor/*.vsix

  build-electron:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-14
            platform: mac
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      LANGTAILOR_SIGNING_ENABLED: ${{ vars.LANGTAILOR_SIGNING_ENABLED }}
      WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build renderer + Electron main
        run: |
          npm ci
          npm run build:desktop
          cd langtailor/desktop
          npm install
          npm run build:main

      - name: Package Electron (Windows)
        if: matrix.platform == 'win'
        run: |
          cd langtailor/desktop
          npx electron-builder --win --config electron-builder.yml

      - name: Package Electron (macOS)
        if: matrix.platform == 'mac'
        run: |
          cd langtailor/desktop
          npx electron-builder --mac --config electron-builder.yml

      - name: Package Electron (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd langtailor/desktop
          npx electron-builder --linux --config electron-builder.yml

      - uses: actions/upload-artifact@v4
        with:
          name: langtailor-electron-${{ matrix.platform }}
          path: dist-langtailor/electron/**/*

  electron-smoke:
    needs: build-electron
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/download-artifact@v4
        with:
          name: langtailor-electron-linux
          path: dist-langtailor/electron
      - name: Electron smoke (optional artifact)
        run: |
          echo "Electron artifacts downloaded for manual/smoke verification"
          ls -la dist-langtailor/electron || true

  publish:
    needs: [build-vsix, build-electron]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: langtailor-vsix
          path: dist-langtailor

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: langtailor-electron-win
          path: dist-release

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: langtailor-electron-mac
          path: dist-release

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: langtailor-electron-linux
          path: dist-release

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=langtailor-v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: LangTailor ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist-langtailor/*.vsix
            dist-release/**/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
