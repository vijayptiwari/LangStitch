name: SDK Publish

# Publishes the langstitch SDK to PyPI when a tag like `langstitch-v0.1.0` is
# pushed (or a matching GitHub Release is published). Uses PyPI Trusted
# Publishing (OIDC) — no API token secret required once the project is
# configured on PyPI to trust this workflow.

on:
  push:
    tags:
      - 'langstitch-v*'
  release:
    types: [published]

permissions:
  contents: read

defaults:
  run:
    working-directory: sdk

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build distribution
        run: python -m pip install --upgrade pip build twine && python -m build && python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: langstitch-dist
          path: sdk/dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: langstitch-dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}
