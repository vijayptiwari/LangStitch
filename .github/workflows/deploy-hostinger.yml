name: Deploy to Hostinger

# Builds public marketing/docs/marketplace sites and uploads to Hostinger shared hosting over FTPS.
# The LangStitch canvas is NOT deployed as a browser app — distribute via VSIX / LangTailor instead.
#
#   langstitch.com           -> public_html/            (marketing + /docs/)
#   langtailor.langstitch.com-> public_html/langtailor/ (download + VSIX instructions)
#   sdk.langstitch.com       -> public_html/sdk/        (SDK landing)
#   marketplace.langstitch.com -> public_html/marketplace/ (marketplace SPA)
#
# Required repo secrets:  FTP_SERVER, FTP_USERNAME, FTP_PASSWORD
# Optional repo variables: FTP_PUBLIC_DIR (default ./),
#                          PLATFORM_API_BASE (e.g. https://api.langstitch.com/api)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Assemble site root
        run: |
          mkdir -p dist
          cp -r site/. dist/
          mkdir -p dist/docs
          cp -r docs/. dist/docs/
          rm -f dist/CNAME

      - name: Build marketplace SPA (served at marketplace subdomain root)
        env:
          VITE_APP_MODE: marketplace
          VITE_PLATFORM_API: ${{ vars.PLATFORM_API_BASE || '/api' }}
        run: |
          npx vite build --outDir dist/marketplace --emptyOutDir
          cat > dist/marketplace/.htaccess <<'HTACCESS'
          Options -MultiViews
          RewriteEngine On
          RewriteBase /
          RewriteRule ^api/ - [L]
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule . index.html [L]
          HTACCESS

      - name: Check FTP secrets
        id: ftpcheck
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          if [ -n "$FTP_SERVER" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::FTP_SERVER secret is not set — built the site but skipped the Hostinger upload."
          fi

      - name: Deploy to Hostinger via FTPS
        if: steps.ftpcheck.outputs.ready == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/
          server-dir: ${{ vars.FTP_PUBLIC_DIR || './' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
