project:
  name: my-langgraph

python:
  image:
    repository: langstitch-graph
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  port: 8000
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi
  env:
    openaiApiKeySecret: langstitch-secrets
    openaiApiKeyKey: OPENAI_API_KEY

spring:
  enabled: true
  image:
    repository: langstitch-gateway
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  port: 8080
  resources:
    limits:
      cpu: "500m"
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

service:
  type: ClusterIP

ingress:
  enabled: false
  className: nginx
  host: langstitch.local
  tls: false

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
