{{- if .Values.spring.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "langstitch.fullname" . }}-spring
  labels:
    {{- include "langstitch.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.spring.replicaCount }}
  selector:
    matchLabels:
      {{- include "langstitch.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "langstitch.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
    spec:
      containers:
        - name: spring
          image: "{{ .Values.spring.image.repository }}:{{ .Values.spring.image.tag }}"
          imagePullPolicy: {{ .Values.spring.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.spring.port }}
          env:
            - name: LANGSTITCH_GRAPH_PYTHON-SERVICE-URL
              value: "http://{{ include "langstitch.fullname" . }}-python:{{ .Values.python.port }}"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.spring.port }}
            initialDelaySeconds: 30
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.spring.port }}
            initialDelaySeconds: 15
          resources:
            {{- toYaml .Values.spring.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "langstitch.fullname" . }}-spring
  labels:
    {{- include "langstitch.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.spring.port }}
      targetPort: {{ .Values.spring.port }}
      name: http
  selector:
    {{- include "langstitch.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
{{- end }}
