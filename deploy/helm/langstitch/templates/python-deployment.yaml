apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "langstitch.fullname" . }}-python
  labels:
    {{- include "langstitch.labels" . | nindent 4 }}
    app.kubernetes.io/component: graph
spec:
  replicas: {{ .Values.python.replicaCount }}
  selector:
    matchLabels:
      {{- include "langstitch.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: graph
  template:
    metadata:
      labels:
        {{- include "langstitch.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: graph
    spec:
      containers:
        - name: python
          image: "{{ .Values.python.image.repository }}:{{ .Values.python.image.tag }}"
          imagePullPolicy: {{ .Values.python.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.python.port }}
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.python.env.openaiApiKeySecret }}
                  key: {{ .Values.python.env.openaiApiKeyKey }}
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.python.port }}
            initialDelaySeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.python.port }}
            initialDelaySeconds: 10
          resources:
            {{- toYaml .Values.python.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "langstitch.fullname" . }}-python
  labels:
    {{- include "langstitch.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.python.port }}
      targetPort: {{ .Values.python.port }}
      name: http
  selector:
    {{- include "langstitch.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: graph
